name: Deploy Backend

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_SSH_PORT || '22' }}
          envs: GHCR_USERNAME,GHCR_PAT,SMTP_PASS
          script: |
            set -e
            cd /opt/nsapp

            if [ ! -f docker-compose.yml ]; then
              echo "Missing /opt/nsapp/docker-compose.yml"
              exit 1
            fi

            # Inject only the sensitive API key — everything else is already in .env
            if [ -n "$SMTP_PASS" ]; then
              if grep -q "^SMTP_PASS=" .env 2>/dev/null; then
                sed -i "s|^SMTP_PASS=.*|SMTP_PASS=${SMTP_PASS}|" .env
              else
                echo "SMTP_PASS=${SMTP_PASS}" >> .env
              fi
            fi

            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker compose pull languages-api
            docker compose up -d --remove-orphans languages-api
            docker image prune -f
