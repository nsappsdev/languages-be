name: Deploy Backend

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_SSH_PORT || '22' }}
          envs: GHCR_USERNAME,GHCR_PAT,SMTP_PASS,SMTP_FROM,APP_BASE_URL
          script: |
            set -e
            cd /opt/nsapp

            if [ ! -f docker-compose.yml ]; then
              echo "Missing /opt/nsapp/docker-compose.yml"
              exit 1
            fi

            # Upsert a KEY=VALUE line in .env
            upsert_env() {
              local key="$1"
              local value="$2"
              if [ -z "$value" ]; then
                return 0
              fi
              if grep -q "^${key}=" .env 2>/dev/null; then
                # Use a delimiter unlikely to appear in values
                sed -i "s|^${key}=.*|${key}=${value}|" .env
              else
                echo "${key}=${value}" >> .env
              fi
            }

            upsert_env SMTP_PASS "$SMTP_PASS"
            upsert_env SMTP_FROM "$SMTP_FROM"
            upsert_env APP_BASE_URL "$APP_BASE_URL"

            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker compose pull languages-api
            docker compose up -d --force-recreate --remove-orphans languages-api
            docker image prune -f
